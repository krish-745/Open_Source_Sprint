rules:
  - id: pii-leak-logger
    message: |
      🚨 0-DAY CANDIDATE: Information Disclosure via Logging 🚨
      The full `task` object, `payload`, or `metadata` is being passed directly into the logger without sanitization.
      Since Taskflow accepts arbitrary user payloads, if a caller passes sensitive data (API Keys, Passwords, PII), this will dump it in plain text to the logging aggregator (Datadog/Splunk), violating compliance (GDPR/SOC2).
    languages:
      - typescript
      - javascript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: logger.error({ ...$VAR, ... }, ...)
          - pattern: logger.info({ ...$VAR, ... }, ...)
          - pattern: logger.warn({ ...$VAR, ... }, ...)
          - pattern: logger.debug({ ...$VAR, ... }, ...)
      - metavariable-regex:
          metavariable: $VAR
          regex: (task|payload|metadata|result|taskData)
