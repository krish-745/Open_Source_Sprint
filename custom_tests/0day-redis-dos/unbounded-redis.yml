rules:
  - id: unbounded-redis-queue-growth
    message: |
      🚨 0-DAY CANDIDATE: Unbounded Redis Queue Growth (Denial of Service) 🚨
      A Redis list or sorted set is being appended to without a preceding bounds check (e.g., lLen or zCard). 
      If this path is reachable via an unauthenticated or weakly-authenticated API, an attacker can spam this endpoint to exhaust all Redis memory and crash the entire Taskflow cluster.
    languages:
      - typescript
      - javascript
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: $CLIENT.lPush(...)
          - pattern: $CLIENT.zAdd(...)
      # Exclude instances where we properly check the length of the queue first
      - pattern-not-inside: |
          $LEN = await $CLIENT.lLen(...);
          ...
          if ($LEN < $LIMIT) { ... }
      - pattern-not-inside: |
          $LEN = await $CLIENT.lLen(...);
          ...
          if ($LEN > $LIMIT) { ... }
      - pattern-not-inside: |
          $LEN = await $CLIENT.zCard(...);
          ...
          if ($LEN < $LIMIT) { ... }
      - pattern-not-inside: |
          $LEN = await $CLIENT.zCard(...);
          ...
          if ($LEN > $LIMIT) { ... }
